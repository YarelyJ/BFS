app = "puzzle-bfs-frontend"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  # Descomenta y reemplaza con la URL de tu backend desplegado
  # NEXT_PUBLIC_API_URL = "https://puzzle-bfs-backend.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  processes = ["app"]
